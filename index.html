<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SortLab — Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">SORT</span>
        <span class="logo-accent">LAB</span>
        <span class="logo-bracket">]</span>
      </div>
      <span class="header-tagline">Algorithm Visualizer</span>
    </div>
    <div class="header-right">
      <!-- Sound toggle -->
      <button class="icon-btn" id="soundToggle" title="Toggle Sound">
        <svg id="soundIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <!-- Theme toggle -->
      <button class="icon-btn" id="themeToggle" title="Toggle Theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ────────────────────────────────────────── -->
  <main class="main">

    <!-- ── LEFT SIDEBAR ──────────────────────────────────────── -->
    <aside class="sidebar">

      <!-- Algorithm Selector -->
      <div class="panel">
        <div class="panel-label">ALGORITHM</div>
        <div class="algo-list" id="algoList">
          <button class="algo-btn active" data-algo="bubble">Bubble Sort</button>
          <button class="algo-btn" data-algo="selection">Selection Sort</button>
          <button class="algo-btn" data-algo="insertion">Insertion Sort</button>
          <button class="algo-btn" data-algo="merge">Merge Sort</button>
          <button class="algo-btn" data-algo="quick">Quick Sort</button>
        </div>
      </div>

      <!-- Algorithm Info -->
      <div class="panel" id="algoInfoPanel">
        <div class="panel-label">COMPLEXITY</div>
        <div class="complexity-grid">
          <div class="complexity-item">
            <span class="complexity-label">Best</span>
            <span class="complexity-value" id="bestCase">—</span>
          </div>
          <div class="complexity-item">
            <span class="complexity-label">Average</span>
            <span class="complexity-value" id="avgCase">—</span>
          </div>
          <div class="complexity-item">
            <span class="complexity-label">Worst</span>
            <span class="complexity-value" id="worstCase">—</span>
          </div>
          <div class="complexity-item">
            <span class="complexity-label">Space</span>
            <span class="complexity-value" id="spaceCase">—</span>
          </div>
        </div>
        <p class="algo-description" id="algoDescription">Select an algorithm to see its description.</p>
      </div>

      <!-- Stats -->
      <div class="panel">
        <div class="panel-label">STATISTICS</div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-value" id="comparisonsCount">0</span>
            <span class="stat-label">Comparisons</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="swapsCount">0</span>
            <span class="stat-label">Swaps</span>
          </div>
        </div>
        <div class="stat-item stat-time">
          <span class="stat-value" id="elapsedTime">0.000s</span>
          <span class="stat-label">Elapsed</span>
        </div>
      </div>

      <!-- Legend -->
      <div class="panel">
        <div class="panel-label">LEGEND</div>
        <div class="legend">
          <div class="legend-item"><span class="legend-swatch default"></span>Unsorted</div>
          <div class="legend-item"><span class="legend-swatch comparing"></span>Comparing</div>
          <div class="legend-item"><span class="legend-swatch swapping"></span>Swapping</div>
          <div class="legend-item"><span class="legend-swatch pivot"></span>Pivot</div>
          <div class="legend-item"><span class="legend-swatch sorted"></span>Sorted</div>
        </div>
      </div>

    </aside>

    <!-- ── MAIN CONTENT ───────────────────────────────────────── -->
    <div class="content">

      <!-- Controls Bar -->
      <div class="controls-bar">
        <div class="control-group">
          <label class="control-label">ARRAY SIZE <span class="control-val" id="sizeVal">60</span></label>
          <input type="range" id="sizeSlider" min="10" max="150" value="60" class="slider" />
        </div>
        <div class="control-group">
          <label class="control-label">SPEED <span class="control-val" id="speedVal">Medium</span></label>
          <input type="range" id="speedSlider" min="1" max="5" value="3" class="slider" />
        </div>
        <div class="control-group actions">
          <button class="btn btn-secondary" id="generateBtn">New Array</button>
          <button class="btn btn-primary" id="startBtn">▶ Sort</button>
          <button class="btn btn-warning hidden" id="pauseBtn">⏸ Pause</button>
          <button class="btn btn-danger hidden" id="stopBtn">■ Stop</button>
        </div>
      </div>

      <!-- Visualizer Area -->
      <div class="viz-wrapper">
        <div class="viz-container" id="vizContainer">
          <!-- Bars rendered by JS -->
        </div>
        <!-- Scan line effect -->
        <div class="scanline"></div>
        <!-- Overlay shown when sorting is complete -->
        <div class="viz-overlay hidden" id="vizOverlay">
          <div class="overlay-content">
            <div class="overlay-checkmark">✓</div>
            <div class="overlay-title">Sort Complete</div>
            <div class="overlay-stats" id="overlayStats"></div>
          </div>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-indicator" id="statusDot"></span>
        <span class="status-text" id="statusText">Ready — select an algorithm and press Sort</span>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
